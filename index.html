<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamming Hata Düzeltme Kodu Simülatörü</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Hamming Hata Düzeltme Kodu Simülatörü</h1>
        <div>
            <label for="bitData">Bit Dizisi:</label>
            <input type="text" id="bitData" placeholder="Bit Dizisi Girin...">
        </div>
        <div>
            <label for="errorPosition">Hata Pozisyonu:</label>
            <input type="number" id="errorPosition" placeholder="Hata Pozisyonu Girin...">
        </div>
        <button onclick="simulateError()">Hata Simülasyonu Yap</button>
        <div id="output"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
